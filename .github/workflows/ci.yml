name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: "3.11"
      - name: Install tools (pinned + hash-locked)
        run: python -m pip install -r requirements-ci.txt
      - name: Compile
        run: python -m compileall glintbar
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Security scan (bandit)
        run: python -m bandit -r . --severity-level medium

  # Unit tests run on Windows: the module imports Windows-only stdlib (winsound,
  # ctypes.wintypes) and probes hardware at import, so it can't load on ubuntu.
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.3.0
        with:
          python-version: "3.11"
      - name: Install test tool (pinned + hash-locked)
        run: python -m pip install -r requirements-test.txt
      - name: Install package (for its runtime deps)
        run: python -m pip install .
      - name: Unit tests (pytest)
        run: python -m pytest tests -q
