name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: python -m pip install ruff bandit
      - name: Compile
        run: python -m py_compile monitor.py
      - name: Lint (ruff)
        run: python -m ruff check .
      - name: Security scan (bandit)
        run: python -m bandit -r . --severity-level medium
