name: Scorecard

# OpenSSF Scorecard: an objective, third-party check of this repo's security
# posture (pinned actions, branch protection, no dangerous workflow patterns,
# etc.). Results feed the badge in the README and the repo's Security tab.

on:
  branch_protection_rule:
  schedule:
    - cron: "20 7 * * 1"   # weekly, Monday 07:20 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to the Security tab
      id-token: write          # publish results for the badge
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.4.3
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
